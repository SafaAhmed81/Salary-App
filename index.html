<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold fs-4">💰 Salary App</span>
        <div class="d-flex gap-3">
            <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="profile.html" class="btn btn-outline-info btn-sm">Profile</a>
            <button onclick="logout()" class="btn btn-warning btn-sm">Logout</button>
        </div>
    </nav>




    <div class="container mt-5">
         
        <form class="row">
            <div class="col-6">
                <input type="text" id="name" class="form-control mt-3" placeholder="Type Employee Name">
            </div>
            <div class="col-6">
                <input type="text" id="basic" class="form-control mt-3" placeholder="Type Employee Basic Salary">
            </div>
            <div class="col-6">
                <input type="text" id="bonus" class="form-control mt-3" placeholder="Type Employee Bonus">
            </div>
            <div class="col-6">
                <input type="text" id="Penalty" class="form-control mt-3" placeholder="Type Employee Penalty">
            </div>
            <div class="col-6">
                <input type="text" id="extra" class="form-control mt-3" placeholder="Type Employee Extra Hours">
            </div>
            <div class="col-6">
                <select id="jobTitle" class="form-select mt-3">
                    <option value="Operator">Operator</option>
                    <option value="Salesman">Salesman</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div class="col-12">
                <select id="currency" class="form-select mt-3">
                    <option value="USD">US Dollars</option>
                    <option value="SAR">Sudia Arabia Rial</option>
                    <option value="GBP">Great Britain Pound</option>
                    <option value="EUR">Euro</option>
                </select>
            </div>
            <div class="mt-5 text-center">
                <button type="button" class="btn btn-outline-primary">Add Employee</button>
                <button type="button" class="btn btn-outline-danger">Clear Employees</button>
            </div>
        </form>
        <table class="table table-bordered text-center mt-5">
            <thead class="table-dark align-middle">
                <tr>
                    <th rowspan="2">Name</th>
                    <th rowspan="2">Basic</th>
                    <th rowspan="2">Bonus</th>
                    <th rowspan="2">Penalty</th>
                    <th colspan="3">Extra Hours</th>
                    <th rowspan="2">Gross</th>
                    <th colspan="2">Taxes</th>
                    <th rowspan="2">Net Salary</th>
                </tr>
                <tr>
                    <th>No. of Hours</th>
                    <th>Hour Value</th>
                    <th>Total</th>
                    <th>Rate</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/functions.js"></script>
    <script src="js/main.js"></script>
    <script src="js/logout.js"></script>

</body>

</html>
