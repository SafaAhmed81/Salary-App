 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #dee2e6;
            font-size: 15px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            background-color: #0d6efd;
            color: white;
            border: none;
            margin-top: 8px;
        }
        .btn-register:hover {
            background-color: #0b5ed7;
        }
        .login-link {
            text-align: center;
            font-size: 14px;
            color: #6c757d;
        }
        .login-link a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .app-logo {
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="app-logo">💰</div>
        <h2 class="text-center fw-bold mb-1">Create Account</h2>
        <p class="text-center text-muted mb-4">Join Salary App today</p>

        <form>
            <div class="mb-3">
                <label class="form-label" style="font-size:14px;">Username</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name">
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-size:14px;">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password">
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-size:14px;">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password">
            </div>
            <button type="button" class="btn-register">Create Account</button>
        </form>

        <div class="divider text-center text-muted my-3" style="font-size:14px;">or</div>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/register.js"></script>
</body>
</html>
