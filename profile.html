 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold fs-4">💰 Salary App</span>
        <div class="d-flex gap-3">
            <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="profile.html" class="btn btn-outline-info btn-sm">Profile</a>
            <button onclick="logout()" class="btn btn-warning btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- Profile Card -->
        <div id="profileCard" class="card mx-auto mb-5 p-4 text-center shadow" style="max-width: 400px;">
            <div id="imgWrapper" class="mb-3">
                <img id="profileImg" src="https://via.placeholder.com/120" 
                     class="rounded-circle border" 
                     style="width:120px; height:120px; object-fit:cover;">
            </div>
            <h4 id="profileName" class="fw-bold mb-1"></h4>
            <p class="text-muted mb-3">Employee</p>
            <label id="uploadBtn" class="btn btn-outline-primary btn-sm">
                Upload Photo
                <input type="file" id="uploadImg" accept="image/*" hidden>
            </label>
        </div>

        <!-- Salary Table -->
        <h5 class="mb-3">Salary History</h5>
        <table class="table table-bordered text-center mt-2">
            <thead class="table-dark align-middle">
                <tr>
                    <th rowspan="2">Month</th>
                    <th rowspan="2">Name</th>
                    <th rowspan="2">Basic</th>
                    <th rowspan="2">Bonus</th>
                    <th rowspan="2">Penalty</th>
                    <th colspan="3">Extra Hours</th>
                    <th rowspan="2">Gross</th>
                    <th colspan="2">Taxes</th>
                    <th rowspan="2">Net Salary</th>
                </tr>
                <tr>
                    <th>No. of Hours</th>
                    <th>Hour Value</th>
                    <th>Total</th>
                    <th>Rate</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/logout.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
